[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    -n auto
    --alluredir=allure-results
    --log-cli-level=INFO
markers =
    smoke: Smoke tests
    regression: Regression tests
    users: User endpoint tests
    posts: Post endpoint tests
    todos: Todo endpoint tests
    comments: Comment endpoint tests
    get: GET method tests
    post: POST method tests
    put: PUT method tests
    patch: PATCH method tests
    delete: DELETE method tests
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
